name: all_box_devtool_extension
description: >
  Flutter Web app for the all_box DevTools extension panel. Built with
  package:devtools_extensions; runs embedded (iFrame) inside Flutter/Dart
  DevTools, connected via the VM Service to an app that depends on
  all_box. Not published to pub.dev on its own — its build output is
  copied into ../ (this package's `extension/devtools/` directory) per
  https://docs.flutter.dev/tools/devtools/custom-tool.
publish_to: "none"
version: 1.0.0

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  all_observer: ^1.5.3
  cupertino_icons: ^1.0.8
  devtools_extensions: ^0.5.1
  devtools_app_shared: ^0.5.1
  vm_service: ">=13.0.0 <16.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
