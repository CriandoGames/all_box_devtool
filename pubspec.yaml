name: all_box_devtool
description: >
  DevTools extension for all_box: inspect and edit AllBox containers (keys,
  values, storage backend, pending flush state) from the Flutter/Dart
  DevTools, for apps that depend on all_box.
version: 1.0.0
homepage: https://github.com/CriandoGames/all_box_devtool
repository: https://github.com/CriandoGames/all_box_devtool
issue_tracker: https://github.com/CriandoGames/all_box_devtool/issues
topics:
  - devtools
  - storage
  - debugging

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

# This package has no runtime API of its own. Its job is to be added as a
# dev_dependency so DevTools can discover the extension under extension/devtools.
dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
